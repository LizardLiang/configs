# Tokyo Night theme for psmux
# Palette reference:
#   bg       #1a1b26
#   bg_dark  #16161e
#   fg       #c0caf5
#   blue     #7aa2f7
#   cyan     #7dcfff
#   magenta  #bb9af7
#   green    #9ece6a
#   yellow   #e0af68
#   orange   #ff9e64
#   red      #f7768e
#   gray     #414868

# Keybinding
set -g prefix C-a

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Let the PSReadLine predictions from $PROFILE (PredictionSource/ViewStyle)
# survive. Default is off (psmux force-disables predictions to dodge the
# issue #109 ConPTY-startup crash); on restores the profile's settings.
set -g allow-predictions on

# Windows and panes start at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#16161e,fg=#c0caf5"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#16161e,fg=#7aa2f7]"

# Right: date + time + mode indicators (set after plugins section)
set -g status-right-length 120

# Windows
set -g window-status-separator ""
set -g window-status-format "#[bg=#16161e,fg=#414868] #I #[fg=#c0caf5]#W "
set -g window-status-current-format "#[bg=#414868,fg=#7aa2f7,bold] #I #[fg=#c0caf5]#W #[bg=#16161e,fg=#414868]"

# Panes
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages / command prompt
set -g message-style "bg=#414868,fg=#c0caf5,bold"
set -g message-command-style "bg=#7aa2f7,fg=#1a1b26,bold"

# Copy-mode highlights
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"

# Clock
set -g clock-mode-colour "#7dcfff"

# Reload config
bind R source-file ~/.config/psmux/psmux.conf

# Floaterm (prefix + t = enter FLOATERM table)
# t → toggle (open popup), c → create popup, Esc/Enter → cancel
bind t switch-client -T FLOATERM
bind -T FLOATERM t if -F '#{popup_active}' 'display-popup -C' 'display-popup -w 80% -h 80% -d "#{pane_current_path}" -E'
bind -T FLOATERM c display-popup -w 80% -h 80% -d "#{pane_current_path}" -E
bind -T FLOATERM Escape switch-client -T root
bind -T FLOATERM Enter  switch-client -T root

# =====================================================================
# Keybindings (mirrored from wezterm.lua — leader = C-a)
# =====================================================================

# Send C-a through when pressed twice
bind C-a send-prefix

# Command palette / prompt
bind Space command-prompt

# Windows (tabs) — tmux style
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind w choose-tree -w
bind '&' kill-window
bind e command-prompt -I "#W" "rename-window '%%'"

# Move windows
bind -r '{' swap-window -t -1
bind -r '}' swap-window -t +1
# move_tab key table (LEADER m, then h/j to move left, k/l to move right)
bind m switch-client -T MOVE_TAB
bind -T MOVE_TAB h swap-window -t -1 \; switch-client -T MOVE_TAB
bind -T MOVE_TAB j swap-window -t -1 \; switch-client -T MOVE_TAB
bind -T MOVE_TAB k swap-window -t +1 \; switch-client -T MOVE_TAB
bind -T MOVE_TAB l swap-window -t +1 \; switch-client -T MOVE_TAB
bind -T MOVE_TAB Escape switch-client -T root
bind -T MOVE_TAB Enter  switch-client -T root

# Panes — tmux style (open splits in current pane's cwd)
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind z resize-pane -Z
bind o rotate-window

# Navigate panes (vim-style) — preserve zoom state like wezterm's SwitchPaneWithZoomState
# select-pane -Z keeps the window zoomed when the new pane was previously zoomed
bind -n C-h select-pane -Z -L
bind -n C-l select-pane -Z -R
bind -n C-k select-pane -Z -U
bind -n C-j select-pane -Z -D

# Navigate panes with CTRL+Arrow and CTRL+SHIFT+Arrow (no prefix) — also zoom-preserving
bind -n C-Left    if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -L \; resize-pane -Z' 'select-pane -L'                                                                    
bind -n C-Down    if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -D \; resize-pane -Z' 'select-pane -D'                                                                    
bind -n C-Up      if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -U \; resize-pane -Z' 'select-pane -U'                                                                    
bind -n C-Right   if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -R \; resize-pane -Z' 'select-pane -R'                                                                    
bind -n C-S-Left  if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -L \; resize-pane -Z' 'select-pane -L'                                                                    
bind -n C-S-Right if -F '#{window_zoomed_flag}' 'resize-pane -Z \; select-pane -R \; resize-pane -Z' 'select-pane -R'                                                                    

# Resize panes (LEADER r, then h/j/k/l; Esc/Enter exits)
bind r switch-client -T RESIZE_PANE
bind -T RESIZE_PANE h resize-pane -L 1 \; switch-client -T RESIZE_PANE
bind -T RESIZE_PANE j resize-pane -D 1 \; switch-client -T RESIZE_PANE
bind -T RESIZE_PANE k resize-pane -U 1 \; switch-client -T RESIZE_PANE
bind -T RESIZE_PANE l resize-pane -R 1 \; switch-client -T RESIZE_PANE
bind -T RESIZE_PANE Escape switch-client -T root
bind -T RESIZE_PANE Enter  switch-client -T root

# Copy mode
bind '[' copy-mode

# Workspace / session picker
bind s choose-tree -s

# Quick window jump by index (LEADER 1..9)
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Plugins
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-prefix-highlight'

# Prefix highlight (Tokyo Night)
set -g @prefix_highlight_fg '#1a1b26'
set -g @prefix_highlight_bg '#ff9e64'
set -g @prefix_highlight_prefix_prompt 'Wait'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'

run '~/.psmux/plugins/ppm/ppm.ps1'

# Status right: Tokyo Night theme + mode indicators (after plugins to override defaults)
set -g status-right "#{?client_prefix,#[fg=#ff9e64,bg=#16161e]#[bg=#ff9e64,fg=#1a1b26,bold] Wait #[fg=#16161e,bg=#ff9e64],}#{?pane_in_mode,#[fg=#e0af68,bg=#16161e]#[bg=#e0af68,fg=#1a1b26,bold] Copy #[fg=#16161e,bg=#e0af68],}#[fg=#414868,bg=#16161e]#[bg=#414868,fg=#c0caf5] %Y-%m-%d #[fg=#7aa2f7,bg=#414868]#[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M "
